<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wizard | RouteSignal</title>
    <meta name="description" content="Long-tail paid API route idea wizard based on RouteSignal data and analysis lenses.">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-page="wizard">
    <header class="topbar">
      <a class="brand" href="./index.html"><span class="brand-mark">R</span><span>RouteSignal</span></a>
      <nav class="nav" aria-label="Primary">
        <a href="./index.html">Routes</a>
        <a href="./analyzer.html">Analyzer</a>
        <a aria-current="page" href="./wizard.html">Wizard</a>
      </nav>
    </header>
    <main>
      <section class="section wizard-board wizard-tool">
        <div class="tool-header compact-tool-header">
          <p class="eyebrow">Wizard</p>
          <h1>Weird route recipes</h1>
          <p class="section-copy">Pick a weird job. See the route chain. Every step should point back to an actual listed route when RouteSignal has one.</p>
        </div>

        <div class="wizard-controls" aria-label="Wizard controls">
          <label><span>Angle</span><select id="wizardStyle"></select></label>
          <label><span>Budget</span><select id="wizardBudget"></select></label>
          <label><span>Risk tolerance</span><select id="wizardRisk"></select></label>
          <label><span>Search</span><input id="wizardSearch" type="search" placeholder="supplier, hotel, token, package, meme"></label>
          <label class="hidden-control"><span>Task</span><select id="wizardTask"></select></label>
        </div>
        <p id="wizardReadout" class="artifact-readout"></p>
        <div id="recipeGridLite" class="recipe-grid weird-recipe-grid"></div>
        <div id="wizardWorkbench" class="wizard-workbench" aria-live="polite"></div>

        <div class="recipe-composer">
          <div class="composer-input-panel">
            <div class="composer-heading">
              <p class="eyebrow">Recipe creator</p>
              <h2>What should the agent accomplish?</h2>
            </div>
            <label class="composer-prompt">
              <span>Goal</span>
              <textarea id="recipePrompt" rows="4" placeholder="Example: Help me diligence a weird hotel in Bangkok before I spend time on it."></textarea>
            </label>
            <div class="composer-actions">
              <button id="composeRecipe" class="button primary" type="button">Generate route recipe</button>
              <button id="clearRecipe" class="button secondary" type="button">Reset</button>
            </div>
            <div class="prompt-chips" aria-label="Example prompts">
              <button type="button" data-prompt="Help me diligence a weird hotel or long-stay asset before I waste time on it.">Long-stay asset</button>
              <button type="button" data-prompt="Find the cheapest contradiction in a founder or vendor claim before a meeting.">Founder contradiction</button>
              <button type="button" data-prompt="Turn a niche social trend into a tiny merch or ad-cell test without building a full store.">Trend to merch</button>
              <button type="button" data-prompt="Check whether a new token or prediction-market event deserves human research, but do not trade.">Token research</button>
            </div>
          </div>
          <div id="composerOutput" class="composer-output" aria-live="polite"></div>
        </div>

        <div id="capabilityMatrix" class="capability-matrix"></div>
      </section>
    </main>
    <script src="./artifact.js" type="module"></script>
  </body>
</html>
